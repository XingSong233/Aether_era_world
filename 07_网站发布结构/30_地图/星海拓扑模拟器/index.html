<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>以太纪元星海拓扑模拟器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="panel panel-left" aria-label="模拟控制">
        <div class="brand-block">
          <p class="eyebrow">Aether Era Map Lab</p>
          <h1>星海拓扑模拟器</h1>
          <p class="subline">可计算航路、文明视角和以太风险叠层图。</p>
        </div>

        <section class="control-group">
          <h2>视角</h2>
          <label>
            文明视角
            <select id="factionSelect"></select>
          </label>
          <label>
            船型
            <select id="shipSelect"></select>
          </label>
          <label>
            任务目标
            <select id="missionSelect"></select>
          </label>
        </section>

        <section class="control-group">
          <h2>路径计算</h2>
          <label>
            起点
            <select id="startSelect"></select>
          </label>
          <label>
            终点
            <select id="endSelect"></select>
          </label>
          <div class="button-row">
            <button id="routeButton" type="button">计算航线</button>
            <button id="clearButton" type="button" class="secondary">清除</button>
          </div>
        </section>

        <section class="control-group">
          <h2>图层</h2>
          <label class="toggle-row">
            <input id="layerInfluence" type="checkbox" checked />
            文明影响
          </label>
          <label class="toggle-row">
            <input id="layerRisk" type="checkbox" checked />
            以太风险
          </label>
          <label class="toggle-row">
            <input id="layerRoutes" type="checkbox" checked />
            航路网络
          </label>
          <label class="toggle-row">
            <input id="layerLabels" type="checkbox" checked />
            节点标签
          </label>
          <label class="toggle-row">
            <input id="layerForbidden" type="checkbox" checked />
            禁限航迹
          </label>
        </section>

        <section class="legend control-group">
          <h2>航路类型</h2>
          <div class="legend-row"><span class="line stargate"></span>星门通行</div>
          <div class="legend-row"><span class="line etherCurrent"></span>以太洋流</div>
          <div class="legend-row"><span class="line anchorChain"></span>锚链航行</div>
          <div class="legend-row"><span class="line freeJump"></span>自由跃迁</div>
          <div class="legend-row"><span class="line darkDrift"></span>暗区潜航</div>
        </section>
      </aside>

      <section class="map-stage" aria-label="星海地图">
        <div id="fileProtocolNotice" class="file-protocol-notice" hidden>
          当前通过本地文件打开，星海数据和 WebGL 视觉层可能无法加载。
          <a href="http://localhost:4173/07_%E7%BD%91%E7%AB%99%E5%8F%91%E5%B8%83%E7%BB%93%E6%9E%84/30_%E5%9C%B0%E5%9B%BE/%E6%98%9F%E6%B5%B7%E6%8B%93%E6%89%91%E6%A8%A1%E6%8B%9F%E5%99%A8/">使用本地服务器打开</a>
        </div>
        <div id="starfieldLayer" aria-hidden="true"></div>
        <div id="particleLayer" aria-hidden="true"></div>
        <div class="toolbar">
          <div class="status-pill" id="viewStatus">读取星海数据...</div>
          <div class="toolbar-actions">
            <button id="fitButton" type="button" class="secondary">重置视图</button>
            <button id="swapButton" type="button" class="secondary">交换起终点</button>
          </div>
        </div>
        <canvas id="mapCanvas" aria-label="星海拓扑画布"></canvas>
        <div id="tooltip" class="tooltip" hidden></div>
      </section>

      <aside class="panel panel-right" aria-label="节点与航线详情">
        <section class="detail-card selected-card">
          <p class="eyebrow">Selection</p>
          <h2 id="selectedTitle">未选择节点</h2>
          <p id="selectedMeta" class="muted">点击画布节点查看详情；第一次点击设为起点，第二次点击设为终点。</p>
          <div id="selectedTags" class="tag-list"></div>
          <p id="selectedDescription"></p>
          <div id="selectedMetrics" class="metric-grid"></div>
        </section>

        <section class="detail-card">
          <p class="eyebrow">Computed Route</p>
          <h2>航线结果</h2>
          <div id="routeSummary" class="route-summary muted">请选择起点和终点。</div>
          <div id="routeBreakdown" class="metric-grid route-metrics"></div>
          <ol id="routeSteps" class="route-steps"></ol>
        </section>

        <section class="detail-card">
          <p class="eyebrow">Model</p>
          <h2>成本模型</h2>
          <div id="modelSummary" class="model-summary"></div>
        </section>
      </aside>
    </main>

    <script defer src="./vendor/tsparticles.slim.bundle.min.js"></script>
    <script type="module" src="./app.js"></script>
    <script>
      if (window.location.protocol === "file:") {
        const notice = document.querySelector("#fileProtocolNotice");
        const status = document.querySelector("#viewStatus");
        if (notice) notice.hidden = false;
        if (status) status.textContent = "请通过 http://localhost:4173 打开；file 协议会阻止地图数据和视觉层。";
      }
    </script>
  </body>
</html>
